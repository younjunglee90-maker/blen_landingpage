<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blen|Date, Chat & Meet New People</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero" aria-label="Blen 소개">
        <img
          class="hero__art"
          src="./assets/right-image-from-pdf.png"
          alt="Blen 커플 일러스트 이미지"
        />

        <div class="hero__content">
          <div class="hero__left">
            <h1 class="hero__title">Blen</h1>
            <p class="hero__subtitle">
              AI가 당신의 성향을 깊이 이해하고,<br />
              가장 잘 맞는 상대를 찾아드립니다.
            </p>

            <div class="hero__actions" role="group" aria-label="다운로드">
              <a
                id="androidBtn"
                class="btn btn--android"
                href="#"
                target="_blank"
                rel="noopener"
              >
                안드로이드 다운로드
              </a>
              <a
                id="iosBtn"
                class="btn btn--ios"
                href="#"
                target="_blank"
                rel="noopener"
              >
                iOS 다운로드
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>

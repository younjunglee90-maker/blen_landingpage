<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blen | Date, Chat & Meet New People</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <nav
        class="site-nav"
        aria-label="Main"
        data-i18n-attr="aria-label"
        data-i18n-key="navAria"
      >
        <a class="site-nav__brand" href="index.html">Blen</a>
        <div class="site-nav__right">
          <ul class="site-nav__list">
            <li>
              <a
                class="site-nav__link site-nav__link--active"
                href="index.html"
                aria-current="page"
                data-i18n="navHome"
                >Home</a
              >
            </li>
            <li>
              <a class="site-nav__link" href="about.html" data-i18n="navAbout">About</a>
            </li>
          </ul>
          <div
            class="site-lang"
            role="group"
            aria-label="Language"
            data-i18n-attr="aria-label"
            data-i18n-key="langAria"
          >
            <button
              type="button"
              class="site-lang__btn site-lang__btn--active"
              data-set-lang="en"
              aria-pressed="true"
            >
              ENG
            </button>
            <button type="button" class="site-lang__btn" data-set-lang="ko" aria-pressed="false">
              KO
            </button>
          </div>
        </div>
      </nav>
    </header>

    <main class="page">
      <section
        class="hero"
        aria-label="Blen introduction"
        data-i18n-attr="aria-label"
        data-i18n-key="heroAria"
      >
        <img
          class="hero__art"
          src="./assets/right-image.svg"
          alt="Blen illustration"
          data-i18n-attr="alt"
          data-i18n-key="heroImgAlt"
        />

        <div class="hero__content">
          <div class="hero__left">
            <h1 class="hero__title">Blen</h1>
            <p class="hero__subtitle" data-i18n-html="heroSubtitle">
              AI understands your personality in depth,<br />
              and helps you find your most compatible match.
            </p>

            <div
              class="hero__actions hero__actions--desktop"
              role="group"
              aria-label="Download"
              data-i18n-attr="aria-label"
              data-i18n-key="downloadAria"
            >
              <a
                class="btn btn--android store-link"
                data-store="android"
                href="#"
                target="_blank"
                rel="noopener"
                data-i18n="btnAndroid"
                >Android Download</a
              >
              <a
                class="btn btn--ios store-link"
                data-store="ios"
                href="#"
                target="_blank"
                rel="noopener"
                data-i18n="btnIos"
                >iOS Download</a
              >
            </div>
          </div>
        </div>

        <div
          class="hero__actions hero__actions--mobile"
          role="group"
          aria-label="Download"
          data-i18n-attr="aria-label"
          data-i18n-key="downloadAria"
        >
          <a
            class="btn btn--android store-link"
            data-store="android"
            href="#"
            target="_blank"
            rel="noopener"
            data-i18n="btnAndroid"
            >Android Download</a
          >
          <a
            class="btn btn--ios store-link"
            data-store="ios"
            href="#"
            target="_blank"
            rel="noopener"
            data-i18n="btnIos"
            >iOS Download</a
          >
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p class="site-footer__text">© 2026 Aether Global LLC</p>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
